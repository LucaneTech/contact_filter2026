{% load static tailwind_tags %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     {% tailwind_css %}
</head>
<body>
  <div class="flex flex-col justify-center items-center h-screen">
    <h1 class="text-2xl font-bold mb-4 text-slate-700 mb-4">Se connecter</h1>
  <form method="post" class="flex flex-col rounded-lg border-1 border-gray-100 shadow-lg max-w-[400px] w-full p-6 md:p-8 ">
    {% csrf_token %}
     <label for="username" class="py-2 md:py-3">Nom d'utilisateur:</label>
     {{ form.username }}
    
     <label for="username" class="py-2 md:py-3">Email:</label>
     {{ form.email }}
     <label for="password" class="py-2 md:py-3">Mot de passe:</label>
     {{ form.password }}
    <button type="submit" class="w-full bg-blue-400 rounded-sm shadow-xl  duration-300 hover:shadow-2xl cursor-pointer p-2 text-white mt-5">Connexion</button>
  </form>
  </div>
</body>
</html>
