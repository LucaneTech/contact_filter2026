{% extends "registration/layout/base.html" %}
{% block content %}
            <div class="max-w-[400px]">
                <div class="shadow-2xl border border-gray-200 rounded-lg mt-0 mb-3 bg-white">

                    <div class="text-center border-b border-gray-200">
                        <div id="error_div"></div>
                        <h3 class="font-light my-4 text-xl">Mot de passe oulié?</h3>
                    </div>

                    {% if form.errors %}
                    <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 relative mx-4 mt-4 rounded">
                        <div id="form_errors">
                            {% for key, value in form.errors.items %}
                                <strong>{{ value }}</strong>
                            {% endfor %}
                        </div>
                        <button type="button" class="absolute top-0 right-0 mt-2 mr-3 text-red-700">
                            &times;
                        </button>
                    </div>
                    {% endif %}

                    <div class="p-6">
                        <form method="POST">
                            {% csrf_token %}

                            <div class="flex justify-center">
                                <div class="w-full md:max-w-[400px]">

                                    <div class="mb-4">
                                        <label class="text-sm mb-1 block" for="id_email">Email</label>
                                        <input type="email"
                                               name="email"
                                               class="w-full border border-gray-300 rounded px-3 py-2 focus:outline-none focus:ring-2 focus:ring-gray-800"
                                               autocomplete="email"
                                               maxlength="254"
                                               required
                                               id="id_email"
                                               placeholder="email">
                                    </div>

                                </div>
                            </div>

                            <div class="flex justify-center">
                                <div class="w-full md:w-10/12">
                                    <div class="mt-0 mb-1">
                                        <button type="submit"
                                                class="w-full bg-blue-400 text-white py-2 rounded hover:bg-blue-600 transition">
                                            Envoyer
                                        </button>
                                    </div>
                                </div>
                            </div>

                        </form>
                    </div>

                    <div class="text-center border-t border-gray-200 py-4">
                        <div class="text-sm">
                            <a href="{% url 'login' %}" class="text-blue-400 hover:underline">
                                Retour à la connexion
                            </a>
                            <br>
                        </div>
                    </div>

                </div>
            </div>
</div>
{% endblock content %}
