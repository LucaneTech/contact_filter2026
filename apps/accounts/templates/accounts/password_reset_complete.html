{% extends "base.html" %}
{% block title %}Mot de passe modifié{% endblock %}
{% block content %}
<div class="flex flex-col justify-center items-center min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
    <div class="w-full max-w-md rounded-2xl border border-slate-700/50 bg-slate-900/50 backdrop-blur-xl p-8 shadow-2xl text-center">
        <div class="w-16 h-16 rounded-full bg-emerald-500/20 flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-xl font-semibold text-slate-100 mb-2">Mot de passe modifié</h2>
        <p class="text-slate-400 text-sm mb-6">Vous pouvez maintenant vous connecter avec votre nouveau mot de passe.</p>
        <a href="{% url 'accounts:login' %}" class="inline-block px-6 py-2.5 rounded-lg bg-blue-600 hover:bg-blue-500 text-white font-medium">
            Se connecter
        </a>
    </div>
</div>
{% endblock %}
