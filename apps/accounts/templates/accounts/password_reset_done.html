{% extends "base.html" %}
{% block title %}Email envoyé{% endblock %}
{% block content %}
<div class="flex flex-col justify-center items-center min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950">
    <div class="w-full max-w-md rounded-2xl border border-slate-700/50 bg-slate-900/50 backdrop-blur-xl p-8 shadow-2xl text-center">
        <div class="w-16 h-16 rounded-full bg-emerald-500/20 flex items-center justify-center mx-auto mb-6">
            <svg class="w-8 h-8 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
        </div>
        <h2 class="text-xl font-semibold text-slate-100 mb-2">Email envoyé</h2>
        <p class="text-slate-400 text-sm mb-6">Si un compte existe avec cet email, vous recevrez un lien pour réinitialiser votre mot de passe.</p>
        <a href="{% url 'accounts:login' %}" class="text-blue-400 hover:text-blue-300">Retour à la connexion</a>
    </div>
</div>
{% endblock %}
