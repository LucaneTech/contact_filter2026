{% extends "base.html" %}
{% block title %}Mot de passe modifié{% endblock %}
{% block content %}
<div class="max-w-md mx-auto px-4 py-12">
    <div class="rounded-2xl border border-slate-700/50 bg-slate-800/50 p-8 text-center">
        <div class="w-14 h-14 rounded-full bg-emerald-500/20 flex items-center justify-center mx-auto mb-4">
            <svg class="w-7 h-7 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg>
        </div>
        <h2 class="text-lg font-semibold text-slate-100 mb-2">Mot de passe mis à jour</h2>
        <a href="{% url 'accounts:profile' %}" class="text-blue-400 hover:text-blue-300">Retour au profil</a>
    </div>
</div>
{% endblock %}
